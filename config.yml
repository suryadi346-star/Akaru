# config.yml — Akaru Configuration
# Ganti nilai di bawah sesuai kebutuhan

# ─── PROVIDER ──────────────────────────────────────────
# Pilihan: gemini | ollama | claude | openai | groq | qwen
provider: "gemini"

# ─── MODEL ─────────────────────────────────────────────
# Sesuaikan dengan provider yang dipilih:
#
# gemini  → gemini-2.0-flash | gemini-1.5-flash-002 | gemini-2.5-pro
# ollama  → llama3.2 | mistral | qwen2.5 | gemma2 | phi3 | deepseek-r1
# claude  → claude-haiku-4-5-20251001 | claude-sonnet-4-20250514
# openai  → gpt-4o-mini | gpt-4o
# groq    → llama3-70b-8192 | mixtral-8x7b-32768 | gemma2-9b-it
# qwen    → qwen-turbo | qwen2.5-72b-instruct | qwen-max
#
model_id: "gemini-2.0-flash"

# ─── OLLAMA (jika pakai local) ──────────────────────────
ollama_base_url: "http://localhost:11434"

# ─── SYSTEM PROMPT ─────────────────────────────────────
system_prompt: >
  Kamu adalah Akaru — AI asisten taktis, kritis, dan efisien.
  Jawab to-the-point, hindari basa-basi.
  Kalau pertanyaannya teknis, langsung ke solusi.
  Bahasa: ikuti bahasa yang digunakan user.

# ─── GENERATION CONFIG ─────────────────────────────────
generation_config:
  temperature: 0.7
  top_p: 0.95
  top_k: 40
  max_output_tokens: 2048
  response_mime_type: "text/plain"   # Gemini only

# ─── SAFETY SETTINGS (Gemini only) ─────────────────────
safety_settings:
  - category: "HARM_CATEGORY_HARASSMENT"
    threshold: "BLOCK_MEDIUM_AND_ABOVE"
  - category: "HARM_CATEGORY_HATE_SPEECH"
    threshold: "BLOCK_MEDIUM_AND_ABOVE"
  - category: "HARM_CATEGORY_SEXUALLY_EXPLICIT"
    threshold: "BLOCK_MEDIUM_AND_ABOVE"
  - category: "HARM_CATEGORY_DANGEROUS_CONTENT"
    threshold: "BLOCK_MEDIUM_AND_ABOVE"

# ─── HISTORY ───────────────────────────────────────────
# Jumlah maksimal pesan yang dijaga di conversation context
max_history: 20
